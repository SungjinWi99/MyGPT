model:
  model_name: "MyGPT2"
  d_model: 512
  vocab_size: 51200 # Dependent on the tokenzier
  n_decoder_blocks: 4
  n_attention_heads: 8
  max_seq_len: 1024
  tie_embeddings: true

tokenizer:
  pretrained_model_name_or_path: "skt/kogpt2-base-v2"
  bos_token: "</s>"
  eos_token: "</s>"
  unk_token: "<unk>"
  pad_token: "<pad>"
  mask_token: "<mask>"

data:
  token_budget: null
  validation_token_budget: 5000000
  rebuild_cache: false
  parquet_batch_size: 1024
  tokenize_batch_size: 128
  num_workers: 2
  pin_memory: true

optimizer:
  name: "adamw"
  lr: 0.0004
  weight_decay: 0.1
  betas: [0.9, 0.95]
  eps: 0.00000001

scheduler:
  name: "cosine"
  warmup_steps: 1000
  min_lr_ratio: 0.1

training:
  batch_size: 16
  gradient_accumulation_steps: 1
  max_steps: null
  target_tokens: null
  resume_from: null
  run_name: null
  max_grad_norm: 1.0
  log_interval_steps: 10
  eval_interval_steps: 500
  eval_steps: 100
  checkpoint_interval_steps: 1000
  sample_interval_steps: 500
  max_new_tokens: 100
  seed: 42
  mixed_precision: "bf16"
  compile_model: false
